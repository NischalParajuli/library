<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Library API</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-white d-flex align-items-center justify-content-center min-vh-100">

  <div style="max-width: 480px; width: 100%; padding: 2rem;">

    <p class="text-uppercase text-muted small letter-spacing-1 mb-2">REST API</p>
    <h1 class="fw-semibold mb-2">Library Management</h1>
    <p class="text-muted mb-4">Manage books, members, and borrowing records through a simple HTTP API.</p>

    <table class="table table-borderless">
      <tbody>
        <tr>
          <td><span class="badge bg-success-subtle text-success">GET</span></td>
          <td><code>/api/books/</code></td>
          <td class="text-muted small">List books</td>
        </tr>
        <tr>
          <td><span class="badge bg-primary-subtle text-primary">POST</span></td>
          <td><code>/api/books/</code></td>
          <td class="text-muted small">Add book</td>
        </tr>
        <tr>
          <td><span class="badge bg-primary-subtle text-primary">POST</span></td>
          <td><code>/api/accounts/register/</code></td>
          <td class="text-muted small">Register</td>
        </tr>
        <tr>
          <td><span class="badge bg-primary-subtle text-primary">POST</span></td>
          <td><code>/api/borrow/</code></td>
          <td class="text-muted small">Borrow book</td>
        </tr>
        <tr>
          <td><span class="badge bg-danger-subtle text-danger">DEL</span></td>
          <td><code>/api/books/{id}/</code></td>
          <td class="text-muted small">Remove book</td>
        </tr>
      </tbody>
    </table>

    <div class="d-flex gap-2 mt-3">
      <a href="/swagger/" class="btn btn-dark btn-sm">Browse API</a>
      <a href="/admin/" class="btn btn-outline-secondary btn-sm">Admin</a>
    </div>

  </div>

</body>
</html>
