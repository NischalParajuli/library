<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Library API</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-white d-flex flex-column align-items-center justify-content-center min-vh-100 px-3">

  <div class="w-100" style="max-width: 520px;">

    <!-- Header -->
    <div class="text-center mb-5">
      <h1 class="fw-semibold mb-2">Library Management API</h1>
      <p class="text-muted">Manage books, members, and borrowing records</p>
    </div>

    <!-- Endpoints -->
    <div class="mb-4">
      <h6 class="text-muted mb-3 text-center">API Endpoints</h6>
      <table class="table table-borderless table-sm align-middle">
        <tbody>
          <tr>
            <td class="text-center" style="width:60px"><span class="badge bg-success-subtle text-success">GET</span></td>
            <td><code>/api/books/</code></td>
            <td class="text-muted small text-end">List books</td>
          </tr>
          <tr>
            <td class="text-center"><span class="badge bg-primary-subtle text-primary">POST</span></td>
            <td><code>/api/books/</code></td>
            <td class="text-muted small text-end">Add book</td>
          </tr>
          <tr>
            <td class="text-center"><span class="badge bg-primary-subtle text-primary">POST</span></td>
            <td><code>/api/accounts/register/</code></td>
            <td class="text-muted small text-end">Register</td>
          </tr>
          <tr>
            <td class="text-center"><span class="badge bg-primary-subtle text-primary">POST</span></td>
            <td><code>/api/login/</code></td>
            <td class="text-muted small text-end">Login</td>
          </tr>
          <tr>
            <td class="text-center"><span class="badge bg-primary-subtle text-primary">POST</span></td>
            <td><code>/api/borrow/</code></td>
            <td class="text-muted small text-end">Borrow book</td>
          </tr>
          <tr>
            <td class="text-center"><span class="badge bg-danger-subtle text-danger">DEL</span></td>
            <td><code>/api/books/{id}/</code></td>
            <td class="text-muted small text-end">Remove book</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Buttons -->
    <div class="d-flex gap-2 justify-content-center">
      <a href="/swagger/" class="btn btn-dark btn-sm px-4">Browse API</a>
      <a href="/admin/" class="btn btn-outline-secondary btn-sm px-4">Admin</a>
    </div>

  </div>

</body>
</html>
